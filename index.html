<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechNews</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="navbar">
    <h1 class="logo">TechNews</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Search news..."
    />
  </header>

  <section class="banner">
    <div class="banner-content">
      <h2>The Future of AI & Space</h2>
      <p>
        Discover the latest innovations in artificial intelligence,
        space exploration and futuristic technology.
      </p>
    </div>
  </section>

  <main>
    <section class="news-grid" id="newsContainer"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
